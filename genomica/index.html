<html lang="en">
<head>
<meta charset="UTF-8">

<title>Genomics and Personalized Medicine — Calendar 26-27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --ink:#12242b;
    --paper:#e8f1f8;
    --panel:#ffffff;
    --line:#c9dced;
    --teal:#1d5b57;
    --teal-deep:#123c39;
    --amber:#c47a2c;
    --rose:#a4433c;
    --grey:#7a8a94;
    --muted:#4d6478;
    --grp-t4:#1d5b57;
    --grp-e4:#3d6b9c;
    --grp-a4:#c47a2c;
    --grp-c4:#a4433c;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px;}

  /* Header */
  header{margin-bottom:26px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--teal);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .eyebrow::before{
    content:"";
    width:7px;height:7px;border-radius:50%;
    background:var(--teal);
    display:inline-block;
  }
  h1{
    font-family:'Fraunces',serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(28px,5vw,40px);
    line-height:1.08;
    margin:0 0 8px;
    letter-spacing:-.01em;
  }
  .subtitle{
    color:var(--muted);
    font-size:15px;
    max-width:52ch;
    line-height:1.5;
  }

  /* Group selector */
  .group-select{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:22px 0 4px;
  }
  .group-btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13.5px;
    padding:9px 16px;
    border-radius:100px;
    border:1.5px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .group-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none;}
  .group-btn:hover{border-color:var(--ink);}
  .group-btn.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }
  .group-btn.active .dot{background:currentColor;}
  .group-btn[data-grp="T4"].active{background:var(--grp-t4);border-color:var(--grp-t4);}
  .group-btn[data-grp="E4"].active{background:var(--grp-e4);border-color:var(--grp-e4);}
  .group-btn[data-grp="A4"].active{background:var(--grp-a4);border-color:var(--grp-a4);}
  .group-btn[data-grp="C4"].active{background:var(--grp-c4);border-color:var(--grp-c4);}
  .group-btn[data-grp="T4"] .dot{background:var(--grp-t4);}
  .group-btn[data-grp="E4"] .dot{background:var(--grp-e4);}
  .group-btn[data-grp="A4"] .dot{background:var(--grp-a4);}
  .group-btn[data-grp="C4"] .dot{background:var(--grp-c4);}

  .schedule-line{
    font-size:13px;
    color:var(--muted);
    line-height:1.6;
    margin:14px 0 26px;
    padding:10px 14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
  }
  .schedule-line strong{color:var(--ink);}

  /* Month tabs */
  .month-tabs{
    display:flex;
    gap:4px;
    border-bottom:1.5px solid var(--line);
    margin-bottom:24px;
    overflow-x:auto;
  }
  .month-tab{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--muted);
    background:none;
    border:none;
    padding:10px 16px 12px;
    cursor:pointer;
    position:relative;
    white-space:nowrap;
  }
  .month-tab.active{color:var(--ink);}
  .month-tab.active::after{
    content:"";
    position:absolute;
    bottom:-1.5px;left:16px;right:16px;
    height:2.5px;
    background:var(--ink);
    border-radius:2px;
  }
  .month-tab .count{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    margin-left:4px;
  }

  /* Timeline */
  .timeline{position:relative;padding-left:26px;}
  .timeline::before{
    content:"";
    position:absolute;
    left:6px;top:6px;bottom:6px;
    width:1.5px;
    background:var(--line);
  }
  .week-group{margin-bottom:28px;}
  .week-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.04em;
    margin-bottom:10px;
    position:relative;
  }
  .week-label::before{
    content:"";
    position:absolute;
    left:-26px;top:3px;
    width:11px;height:11px;
    border-radius:50%;
    background:var(--paper);
    border:2px solid var(--ink);
  }

  .session-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:10px;
    display:flex;
    gap:14px;
    align-items:flex-start;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .session-card:hover{
    transform:translateY(-1px);
    box-shadow:0 4px 16px rgba(18,36,43,.07);
  }
  .session-card.type-tutoria{border-left:3px solid var(--amber);}
  .session-card.type-avaluacio{border-left:3px solid var(--rose);}
  .session-card.type-classe{border-left:3px solid var(--teal);}
  .session-card.type-festiu{
    border-left:3px solid var(--grey);
    background:transparent;
    box-shadow:none;
    opacity:.72;
  }
  .session-card.type-festiu:hover{transform:none;box-shadow:none;}

  .s-date{
    flex:none;
    width:76px;
    text-align:center;
  }
  .s-date .d{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
    line-height:1;
    color:var(--ink);
  }
  .s-date .dow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    color:var(--muted);
    letter-spacing:.03em;
    margin-top:3px;
    line-height:1.25;
  }

  .s-body{flex:1;min-width:0;}
  .s-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-weight:500;
    margin-bottom:5px;
    display:inline-block;
  }
  .type-classe .s-tag{color:var(--teal);}
  .type-tutoria .s-tag{color:var(--amber);}
  .type-avaluacio .s-tag{color:var(--rose);}
  .type-festiu .s-tag{color:var(--grey);}

  .s-title{
    font-weight:600;
    font-size:15px;
    line-height:1.35;
    margin-bottom:3px;
  }
  .s-sub{
    font-size:13px;
    color:var(--muted);
    line-height:1.4;
  }
  .s-time{
    flex:none;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:7px;
    padding:5px 9px;
    white-space:nowrap;
    align-self:center;
  }
  .s-note{
    margin-top:6px;
    font-size:12px;
    color:var(--amber);
    font-weight:500;
  }

  footer{
    margin-top:40px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-size:12.5px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  @media (max-width:520px){
    .wrap{padding:20px 14px 40px;}
    .session-card{flex-wrap:wrap;}
    .s-time{order:3;}
  }

  .lang-select{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:16px;
  }
  .lang-toggle{
    display:flex;
    gap:2px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:100px;
    padding:3px;
  }
  .lang-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:500;
    letter-spacing:.03em;
    padding:6px 12px;
    border-radius:100px;
    border:none;
    background:none;
    color:var(--muted);
    cursor:pointer;
    transition:all .15s ease;
  }
  .lang-btn.active{
    background:var(--ink);
    color:#fff;
  }
  .fullscreen-btn{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'Inter',sans-serif;
    font-size:12px;
    font-weight:600;
    color:var(--ink);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:100px;
    padding:8px 14px;
    cursor:pointer;
    transition:all .15s ease;
    text-decoration:none;
  }
  .fullscreen-btn:hover{border-color:var(--ink);}
  .fullscreen-btn svg{width:13px;height:13px;flex:none;}
  header{}
  @media (max-width:640px){
    .lang-select{justify-content:flex-start;flex-wrap:wrap;}
  }

  @media (prefers-reduced-motion: reduce){
    .session-card{transition:none;}
  }
</style>

// assign type to each event based on its observation text
Object.keys(EVENTS).forEach(g=>{
  EVENTS[g].forEach(ev=>{ ev.type = classify(ev.obs); });
});

const MONTH_KEYS = [9,10,11,12];
const YEAR_FOR = m => 2026;

let currentGroup = "T4";
let currentMonth = 9;

function render(){
  const t = I18N[currentLang];

  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
  document.documentElement.lang = currentLang;

  document.getElementById('txt-eyebrow').textContent = t.eyebrow;
  document.getElementById('txt-title').textContent = t.title;
  document.getElementById('txt-subtitle').textContent = t.subtitle;
  document.getElementById('txt-footer').textContent = t.footer;
  document.getElementById('txt-fullscreen').textContent = t.fullscreen;

  ['T4','E4','A4','C4'].forEach(g=>{
    document.getElementById('lbl-'+g).textContent = GROUP_SHORT[g];
  });

  document.querySelectorAll('.group-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.grp === currentGroup);
  });
  document.getElementById('scheduleLine').innerHTML =
    t.schedule(GROUP_META[currentGroup][currentLang], SCHEDULES[currentGroup][currentLang]);

  const allEvents = EVENTS[currentGroup];
  const monthTabs = document.getElementById('monthTabs');
  monthTabs.innerHTML = '';
  MONTH_KEYS.forEach(mkey=>{
    const count = allEvents.filter(e=>e.m===mkey).length;
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (mkey===currentMonth ? ' active' : '');
    btn.innerHTML = `${t.months[mkey]}<span class="count">(${count})</span>`;
    btn.addEventListener('click', ()=>{ currentMonth = mkey; render(); });
    monthTabs.appendChild(btn);
  });

  const monthEvents = allEvents
    .filter(e=>e.m===currentMonth)
    .sort((a,b)=> a.d - b.d);

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  if(monthEvents.length===0){
    timeline.innerHTML = `<div style="color:var(--muted);font-size:14px;padding:20px 0;">${t.noSessions(currentGroup)}</div>`;
    return;
  }

  monthEvents.forEach(ev=>{
    const card = document.createElement('div');
    card.className = `session-card type-${ev.type}`;
    const dow = dowLabel(ev.d, ev.m, YEAR_FOR(ev.m));
    const title = t.titles[ev.obs] || ev.obs;
    const isFestiu = ev.type === 'festiu';
    card.innerHTML = `
      <div class="s-date">
        <div class="d">${ev.d}</div>
        <div class="dow">${dow}</div>
      </div>
      <div class="s-body">
        <span class="s-tag">${t.typeLabel[ev.type]}</span>
        <div class="s-title">${title}</div>
        ${ev.room ? `<div class="s-sub">${t.roomLabel} ${ev.room}</div>` : ''}
      </div>
      ${isFestiu ? '' : `<div class="s-time">${ev.start}–${ev.end}</div>`}
    `;
    timeline.appendChild(card);
  });
}

document.getElementById('groupSelect').addEventListener('click', (e)=>{
  const btn = e.target.closest('.group-btn');
  if(!btn) return;
  currentGroup = btn.dataset.grp;
  render();
});

document.getElementById('langSelect').addEventListener('click', (e)=>{
  const btn = e.target.closest('.lang-btn');
  if(!btn) return;
  currentLang = btn.dataset.lang;
  render();
});

document.getElementById('fullscreenBtn').addEventListener('click', ()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
});

document.addEventListener('fullscreenchange', ()=>{
  const t = I18N[currentLang];
  const label = document.getElementById('txt-fullscreen');
  label.textContent = document.fullscreenElement ? t.exitFullscreen : t.fullscreen;
});

render();
